<!DOCTYPE html>
<html lang="my">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#8b0000;
font-family:Arial;
color:white;
}

.login-box{
width:320px;
background:#6b0000;
padding:25px;
border-radius:10px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:gold;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.captcha-area{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
}

.captcha{
background:white;
color:black;
padding:8px 15px;
border-radius:5px;
font-weight:bold;
}

.refresh{
cursor:pointer;
font-size:18px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>အကောင့်ထဲဝင်ရန်</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<div class="captcha-area">

<div class="captcha" id="captcha"></div>

<div class="refresh" onclick="createCaptcha()">🔄</div>

</div>

<input type="text" placeholder="Captcha code">

<button onclick="login()">အကောင့်ထဲဝင်ရန်</button>

</div>

<script>

function createCaptcha(){

let num = Math.floor(1000 + Math.random() * 9000);

document.getElementById("captcha").innerText = num;

}

createCaptcha();

function login(){

window.location.href="https://is.gd/shwecasino_com";

}

</script>

</body>
</html>
