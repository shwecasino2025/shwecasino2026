<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login</title>

<style>

body{
margin:0;
background:#8b0000;
font-family:Myanmar Text;
text-align:center;
color:white;
}

.container{
padding:20px;
}

input{
width:90%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
background:#a33;
color:white;
font-size:16px;
}

.captcha-row{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
}

.captcha-box{
width:45px;
height:45px;
background:#e6c27a;
color:black;
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
border-radius:4px;
}

button{
width:90%;
padding:15px;
background:#e6c27a;
border:none;
border-radius:10px;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>အကောင့်ထဲဝင်ရန်</h2>

<input type="text" placeholder="အမည်ပြုအမည်">
<input type="password" placeholder="စကားဝှက်">

<p>စကားဝှက်မေ့နေပါသလား?</p>

<div class="captcha-row">

<div class="captcha-box" id="c1"></div>
<div class="captcha-box" id="c2"></div>
<div class="captcha-box" id="c3"></div>
<div class="captcha-box" id="c4"></div>
<div class="captcha-box" id="c5"></div>

</div>

<input type="text" placeholder="အပေါ်ကဂဏန်းကိုထည့်ပါ">

<button>အကောင့်ထဲဝင်ရန်</button>

</div>

<script>

function captcha(){

let numbers="0123456789";

for(let i=1;i<=5;i++){

let r=Math.floor(Math.random()*10);

document.getElementById("c"+i).innerHTML=numbers[r];

}

}

window.onload=captcha;

</script>

</body>
</html>
