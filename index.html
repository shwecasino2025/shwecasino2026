<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShweCasino Login</title>

<style>

body{
margin:0;
font-family:Myanmar Text, sans-serif;
background:#8b0000;
color:white;
}

/* banner */

.banner img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

/* login box */

.container{
padding:20px;
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
color:#ffd27f;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
background:#8f2a2a;
color:white;
font-size:16px;
}

input::placeholder{
color:#cfcfcf;
}

.password-box{
position:relative;
}

.eye{
position:absolute;
right:15px;
top:16px;
cursor:pointer;
color:#ffd27f;
}

/* captcha */

.captcha-box{
background:#e6c88f;
color:black;
padding:15px;
border-radius:12px;
text-align:center;
font-size:26px;
letter-spacing:10px;
margin:10px 0;
}

.refresh{
cursor:pointer;
margin-left:10px;
}

/* login button */

.login-btn{
width:100%;
background:#f0c16b;
border:none;
padding:16px;
border-radius:12px;
font-size:20px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
}

/* links */

.links{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:15px;
color:#ffd27f;
}

.links a{
color:#ffd27f;
text-decoration:none;
}

</style>
</head>

<body>

<div class="banner">
<img src="https://i.imgur.com/8Km9tLL.jpg">
</div>

<div class="container">

<div class="title">အကောင့်ထဲဝင်ရန်</div>

<input type="text" placeholder="အကောင့်ပြုလုပ်အမည်">

<div class="password-box">
<input type="password" id="password" placeholder="စကားဝှက်">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<div style="text-align:right;margin-bottom:10px;">
စကားဝှက်မေ့နေပါသလား?
</div>

<div class="captcha-box">
<span id="captcha"></span>
<span class="refresh" onclick="createCaptcha()">↻</span>
</div>

<input type="text" placeholder="အပေါ်ကဂဏန်းတွေကိုထည့်ပါ">

<button class="login-btn" onclick="login()">အကောင့်ထဲဝင်ရန်</button>

<div class="links">
<a href="#">အကောင့်အသစ်ဖွင့်ရန်</a>
<a href="#">စာရင်းသွင်းရန်</a>
</div>

</div>

<script>

/* password show hide */

function togglePassword(){
let pass = document.getElementById("password");

if(pass.type === "password"){
pass.type = "text";
}else{
pass.type = "password";
}
}

/* captcha */

function createCaptcha(){

let num = "";

for(let i=0;i<5;i++){
num += Math.floor(Math.random()*10);
}

document.getElementById("captcha").innerText = num;

}

createCaptcha();

/* login redirect */

function login(){

window.location.href="https://is.gd/shwecasino_com";

}

</script>

</body>
</html>
